[project]
name = "my-python-app"
version = "1.0.0"

[project.scripts]
serve = "my_app:main"
worker = "my_app.worker:start"

[tool.ruff]
line-length = 100
select = ["E", "F", "I"]

[tool.mypy]
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.backends._legacy:_Backend"
